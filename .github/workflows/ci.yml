name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy (strict)
        run: mypy src/greeklab

      - name: Pytest
        run: pytest --cov=greeklab --cov-report=term-missing

  dashboard-smoke:
    name: Dashboard smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev + app dependencies
        run: python -m pip install -e ".[dev,app]"

      - name: Run dashboard smoke test
        run: pytest tests/test_dashboard_smoke.py -q
